version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: volt
      POSTGRES_PASSWORD: password
      POSTGRES_DB: volt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://volt:password@db:5432/volt_db?schema=public
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
